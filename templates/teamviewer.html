<!DOCTYPE html>
<html lang="en">

{% extends "base.html" %}
{% import "bootstrap/wtf.html" as wtf %}
<link rel="stylesheet" href="/static/visual.css">
<link rel="icon" type="image/x-icon" href="/static/favicon.png">

<head>
    <meta charset="UTF-8">
    <title>{{ title }}</title>
</head>
<body>
    <div class="container">
        {% block body %}
        <h1>Current Teams</h1>
            <div class="box-list">
                {% for x in current_team %}
                <div>
                    <a href="{{ url_for('teamview', id=x.id, users=users) }}">{{ x.name }}</a>
                </div>
                {% endfor %}
            </div>
        {% endblock %}
    </div>
</body>
</html>
